; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.memory_type = opi_opi
monitor_speed = 115200
build_flags = 
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-DDEFAULT_FTP_SERVER_NETWORK_TYPE_ESP32=NETWORK_ESP32
	-DDEFAULT_STORAGE_TYPE_ESP32=STORAGE_SD_MMC
lib_compat_mode = strict
lib_deps = 
	adafruit/Adafruit GFX Library@^1.12.4
	adafruit/Adafruit SSD1306@^2.5.16
	madhephaestus/ESP32Encoder@^0.12.0
	esp32async/AsyncTCP@^3.4.10
	esp32async/ESPAsyncWebServer@^3.10.0
	ayushsharma82/ElegantOTA@^3.1.7
	xreef/SimpleFTPServer@^3.0.1
	; ayushsharma82/WebSerial@^2.1.2
